[workspace]
name = "genecircuitry"
version = "0.1.6"
description = "A package for transcriptional regulatory network analysis"
authors = ["Samuele Cancellieri <samuelc@uio.no>"]
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

# ── Core conda-installable dependencies ──────────────────────────────────────
[dependencies]
python = ">=3.9,<3.11"
numpy = ">=1.20.0,<2.0.0"
pandas = ">=1.0.3,<=1.5.3"
scanpy = ">=1.9.0"
anndata = ">=0.8.0"
matplotlib = ">=3.6.3,<3.7"
seaborn = ">=0.11.0"
scipy = ">=1.7.0"
networkx = ">=2.6.0"
leidenalg = "*"
adjusttext = ">=0.7.3"
pip = "*"

# ── Pip-only dependencies (not on conda-forge/bioconda) ──────────────────────
# celloracle and hotspotsc are only available on PyPI.
# pixi resolves these via pip inside the conda environment, which is safe
# and does not affect conda package metadata.
[pypi-dependencies]
celloracle = "==0.18.0"
hotspotsc = "==1.1.3"
weasyprint = ">=52.5"
"fa2-modified" = "*"

# ── Install genecircuitry itself in editable mode from this source tree ───────
# Uncomment one of the lines below depending on your use case:
#   genecircuitry = { path = ".", editable = true }   # development (editable)
#   genecircuitry = { path = "." }                    # non-editable local install

# ── Development feature (pytest, linting, type checking) ─────────────────────
[feature.dev.dependencies]
pytest = ">=7.0.0"
pytest-cov = ">=3.0.0"
black = ">=22.0.0"
flake8 = ">=4.0.0"
mypy = ">=0.950"

# ── Environments ──────────────────────────────────────────────────────────────
[environments]
default = { features = [], solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

# ── Tasks ─────────────────────────────────────────────────────────────────────
[tasks]
test = "pytest tests/ -v"
lint = "flake8 genecircuitry/"
format = "black genecircuitry/"
typecheck = "mypy genecircuitry/"
run = "genecircuitry --help"
