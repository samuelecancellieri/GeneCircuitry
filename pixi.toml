[workspace]
name = "genecircuitry"
version = "0.1.7"
description = "A package for transcriptional regulatory network analysis"
authors = ["Samuele Cancellieri <samuelc@uio.no>"]
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

# ── Core conda-installable dependencies ──────────────────────────────────────
[dependencies]
python = ">=3.9,<3.11"
numpy = ">=1.20.0,<2.0.0"
pandas = ">=1.0.3,<=1.5.3"
scanpy = ">=1.9.0"
anndata = ">=0.8.0"
matplotlib = ">=3.6.3,<3.7"
seaborn = ">=0.11.0"
scipy = ">=1.7.0"
networkx = ">=2.6.0"
igraph = ">=0.10.1"
leidenalg = "*"
gseapy = "*"
adjusttext = ">=0.7.3"
# velocyto build deps (setup.py imports numpy + cython at build time)
cython = "*"
# Ensure the conda env's libstdc++ is used instead of the (older) system one.
# Prevents GLIBCXX_3.4.30 not found errors from scipy/numpy native extensions.
libstdcxx-ng = ">=12"
# <81.0.0: setuptools 81+ has breaking changes around pkg_resources and namespace packages
setuptools = ">=62.1.0,<81.0.0"
# weasyprint system libraries for PDF export
pango = "*"
pip = "*"

# ── Pip-only dependencies (not on conda-forge/bioconda) ──────────────────────
# celloracle and hotspotsc are only available on PyPI.
# pixi resolves these via pip inside the conda environment, which is safe
# and does not affect conda package metadata.
[pypi-dependencies]
velocyto = ">=0.17.17"
celloracle = "==0.18.0"
hotspotsc = "==1.1.3"
weasyprint = ">=52.5"
"fa2-modified" = "*"
# gimmemotifs (celloracle dep) imports pkg_resources at the top level,
# which requires setuptools to be present in the pip layer as well.
# <81.0.0: setuptools 81+ has breaking changes around pkg_resources and namespace packages
setuptools = ">=62.1.0,<81.0.0"
# Install genecircuitry itself in editable mode from this source tree
genecircuitry = { path = ".", editable = true }

# velocyto's setup.py imports numpy at the top level, which breaks PEP 517
# isolated builds. Disable isolation so the conda env's numpy/cython are used.
[pypi-options]
no-build-isolation = ["velocyto"]

# ── Activation ────────────────────────────────────────────────────────────────
# Prepend the conda env's lib dir so native extensions (scipy, numpy, etc.)
# resolve against the env's libstdc++ rather than the (older) system one.
# Fixes: GLIBCXX_3.4.30 not found on RHEL/CentOS 7/8 hosts.
[activation]
env = { LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH" }

# ── Development feature (pytest, linting, type checking) ─────────────────────
[feature.dev.dependencies]
pytest = ">=7.0.0"
pytest-cov = ">=3.0.0"
black = ">=22.0.0"
flake8 = ">=4.0.0"
mypy = ">=0.950"

[feature.dev.tasks]
test = "pytest tests/ -v"
lint = "flake8 genecircuitry/"
format = "black genecircuitry/"
typecheck = "mypy genecircuitry/"

# ── Environments ──────────────────────────────────────────────────────────────
[environments]
default = { features = [], solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

# ── Tasks ─────────────────────────────────────────────────────────────────────
[tasks]
run = "genecircuitry --help"
