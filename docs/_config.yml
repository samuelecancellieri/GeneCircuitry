title: GeneCircuitry
description: >-
  A Python package for transcriptional regulatory network (TRN) analysis
  using single-cell data. Integrates Scanpy, CellOracle, and Hotspot into
  a modular, checkpoint-enabled pipeline.
baseurl: "/GeneCircuitry"
url: "https://samuelecancellieri.github.io"

remote_theme: just-the-docs/just-the-docs@v0.10.1

color_scheme: light
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/

heading_anchors: true

aux_links:
  "View on GitHub":
    - "https://github.com/samuelecancellieri/genecircuitry"

aux_links_new_tab: true

nav_sort: case_insensitive
back_to_top: true
back_to_top_text: "Back to top"

footer_content: >
  GeneCircuitry &nbsp;·&nbsp; MIT License &nbsp;·&nbsp;
  <a href="https://github.com/samuelecancellieri/genecircuitry">GitHub</a>

last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"

callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-github-metadata

exclude:
  - "*.py"
  - "*.sh"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
