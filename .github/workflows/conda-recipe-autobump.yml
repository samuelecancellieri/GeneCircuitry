name: Bump conda recipe on release

# Triggered when a GitHub release is published (including pre-releases).
# The job updates conda-recipe/meta.yaml with the new version and the
# sha256 of the corresponding PyPI source tarball, then commits the
# change back to the default branch.
#
# Bioconda auto-bump (for the bioconda-recipes repository):
#   Once the package is accepted into bioconda, the bioconda bot monitors
#   PyPI automatically via the `extra.identifiers: - pypi:genecircuitry`
#   field in meta.yaml and opens PRs there without any additional setup.
on:
  release:
    types: [published]

permissions:
  contents: write # required to commit the updated meta.yaml

jobs:
  bump-conda-recipe:
    name: Update conda-recipe/meta.yaml
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the default branch (not the detached tag HEAD) ────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      # ── 2. Derive version from the release tag (strip leading 'v') ────────
      - name: Extract version from release tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      # ── 3. Wait for the source tarball to appear on PyPI ─────────────────
      #    publish.yml runs in parallel; wait up to 6 minutes (12 × 30 s).
      - name: Wait for PyPI availability
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://pypi.org/pypi/genecircuitry/${VERSION}/json"
          echo "Polling $URL ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "genecircuitry $VERSION is available on PyPI."
              exit 0
            fi
            echo "Attempt $i/12: HTTP $STATUS – retrying in 30 s ..."
            sleep 30
          done
          echo "::error::genecircuitry $VERSION did not appear on PyPI within 6 minutes."
          exit 1

      # ── 4. Compute sha256 of the PyPI source tarball ─────────────────────
      - name: Compute sha256
        id: sha256
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://pypi.io/packages/source/g/genecircuitry/genecircuitry-${VERSION}.tar.gz"
          SHA256=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "sha256: $SHA256"

      # ── 5. Rewrite version and sha256 in conda-recipe/meta.yaml ──────────
      - name: Update meta.yaml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha256.outputs.sha256 }}"

          python3 - <<'PYEOF'
          import re, os, sys

          version = os.environ["VERSION"]
          sha256  = os.environ["SHA256"]
          path    = "conda-recipe/meta.yaml"

          with open(path) as f:
              content = f.read()

          # Update: {% set version = "..." %}
          content = re.sub(
              r'^(\{%\s*set version\s*=\s*")[^"]*("\s*%\})',
              r'\g<1>' + version + r'\g<2>',
              content,
              flags=re.MULTILINE,
          )

          # Update sha256 – handles both commented (#) and uncommented forms
          content = re.sub(
              r'^(\s*)(?:#\s*)?sha256:\s*.*$',
              r'\g<1>sha256: ' + sha256,
              content,
              flags=re.MULTILINE,
          )

          with open(path, "w") as f:
              f.write(content)

          print(f"meta.yaml updated → version={version}  sha256={sha256}")
          PYEOF
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha256.outputs.sha256 }}

      # ── 6. Commit and push (skip if nothing changed) ──────────────────────
      - name: Commit updated recipe
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add conda-recipe/meta.yaml
          if git diff --cached --quiet; then
            echo "No changes to meta.yaml – skipping commit."
          else
            git commit -m "chore: bump conda recipe to v${{ steps.version.outputs.version }} [skip ci]"
            git push
          fi
