name: Docker

on:
  push:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "pyproject.toml"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "pyproject.toml"
      - ".github/workflows/docker.yml"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  docker:
    name: ${{ (github.event_name == 'release' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))) && 'Build & push' || 'Build (CI)' }}
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up QEMU (multi-platform emulation) ─────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Set up Docker Buildx ───────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to Docker Hub (publish runs only) ───────────────────────
      # Requires repository secrets:
      #   DOCKERHUB_USERNAME  – your Docker Hub username
      #   DOCKERHUB_TOKEN     – a Docker Hub access token (not your password)
      - name: Log in to Docker Hub
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. Derive image tags and labels from Git metadata ─────────────────
      # On release, produces:
      #   samuelecancellieri/genecircuitry:latest
      #   samuelecancellieri/genecircuitry:1.2.3
      #   samuelecancellieri/genecircuitry:1.2
      # On CI builds, metadata is computed but image is not pushed.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/genecircuitry
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
          labels: |
            org.opencontainers.image.title=GeneCircuitry
            org.opencontainers.image.description=Transcriptional regulatory network analysis pipeline
            org.opencontainers.image.authors=Samuele Cancellieri <samuelc@uio.no>
            org.opencontainers.image.source=https://github.com/samuelecancellieri/GeneCircuitry
            org.opencontainers.image.licenses=MIT

      # ── 6. Build (and push on release) ───────────────────────────────────
      # push=false on PRs and branch pushes: image is built and cached but
      # never written to the registry, so CI validates the Dockerfile cheaply.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'release' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
