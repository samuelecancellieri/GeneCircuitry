name: Build & Push Docker Image

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  docker:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up QEMU (multi-platform emulation) ─────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Set up Docker Buildx ───────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to Docker Hub ───────────────────────────────────────────
      # Requires repository secrets:
      #   DOCKERHUB_USERNAME  – your Docker Hub username
      #   DOCKERHUB_TOKEN     – a Docker Hub access token (not your password)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. Derive image tags and labels from Git metadata ─────────────────
      # Produces tags like:
      #   samuelecancellieri/genecircuitry:latest
      #   samuelecancellieri/genecircuitry:1.2.3       (from vX.Y.Z tag)
      #   samuelecancellieri/genecircuitry:1.2          (major.minor)
      #   samuelecancellieri/genecircuitry:sha-<commit>
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/genecircuitry
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
          labels: |
            org.opencontainers.image.title=GeneCircuitry
            org.opencontainers.image.description=Transcriptional regulatory network analysis pipeline
            org.opencontainers.image.authors=Samuele Cancellieri <samuelc@uio.no>
            org.opencontainers.image.source=https://github.com/samuelecancellieri/GeneCircuitry
            org.opencontainers.image.licenses=MIT

      # ── 6. Build and push ─────────────────────────────────────────────────
      # Layer cache is stored in the GitHub Actions cache to speed up
      # subsequent builds (only changed layers are rebuilt).
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
