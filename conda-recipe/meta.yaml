{% set name = "genecircuitry" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/samuelecancellieri/GeneCircuitry/archive/refs/tags/v{{ version }}.tar.gz
  # TODO: replace with the real sha256 of the release tarball before bioconda submission.
  # Compute with: curl -sL <url> | sha256sum
  sha256: a97a3c65adba6eb5a6003f2465a0f7f15a70a4175f99f82942dacef39b4c5c8f

build:
  number: 0
  # genecircuitry itself is pure Python. Compiled run-deps (velocyto.py)
  # are arch-specific but handled by their own recipes.
  noarch: python
  script: "$PYTHON -m pip install --no-deps --no-build-isolation -vv ."
  entry_points:
    # Mirrors [project.scripts] in pyproject.toml
    - genecircuitry = genecircuitry.pipeline.controller:main
  run_exports:
    # Allow downstream packages to depend on any patch-compatible release.
    - {{ pin_subpackage('genecircuitry', max_pin='x.x') }}

requirements:
  host:
    - python >=3.9,<3.11
    - pip
    - setuptools >=45
    - wheel
    - setuptools_scm >=6.2
  run:
    - python >=3.9,<3.11
    - numpy ==1.26.4          # pinned; matches requirements.txt
    - pandas >=1.3.0
    - scanpy >=1.9.0
    - anndata >=0.8.0
    - matplotlib-base >=3.6.3  # matplotlib-base avoids the heavy Qt/GUI deps
    - seaborn >=0.11.0
    - scipy >=1.7.0
    - adjusttext >=0.7.3      # conda-forge name for adjustText
    - networkx >=2.6.0
    - leidenalg
    - gseapy
    - velocyto.py ==0.17.17
    - fa2_modified
    - weasyprint
    # celloracle and hotspot are not on conda-forge/bioconda;
    # they are installed automatically via post-link.sh


test:
  imports:
    - genecircuitry
    - genecircuitry.pipeline
    - genecircuitry.preprocessing
    - genecircuitry.plotting
    - genecircuitry.reporting

  commands:
    # Confirm the CLI entry point is present and callable
    - genecircuitry --help

  requires:
    - pytest >=7.0.0
    - pytest-cov >=3.0.0

about:
  home: https://github.com/samuelecancellieri/genecircuitry
  summary: "GeneCircuitry: TRN analysis from single-cell data (Scanpy, CellOracle, Hotspot)"
  description: |
    A modular, checkpoint-enabled pipeline for TRN analysis from
    single-cell RNA-seq data. Integrates Scanpy for preprocessing and
    clustering, CellOracle for GRN inference, and Hotspot for embedding-aware
    gene modules identification. Provides an HTML/PDF reporting layer
    and a standalone ``genecircuitry`` CLI entry point.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://github.com/samuelecancellieri/genecircuitry/blob/main/README.md
  dev_url: https://github.com/samuelecancellieri/genecircuitry

extra:
  recipe-maintainers:
    - samuelecancellieri
