{% set name = "genecircuitry" %}
{% set version = "0.1.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  # sha256 is filled in by the conda-forge/bioconda bot on submission
  # sha256: <fill in before submitting>

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install --no-deps --no-build-isolation . -vv
  entry_points:
    # Mirrors [project.scripts] in pyproject.toml
    - genecircuitry = genecircuitry.pipeline.controller:main

requirements:
  host:
    - python >=3.9,<3.11
    - pip
    - setuptools
  run:
    - python >=3.9,<3.11
    - numpy >=1.20.0,<2.0.0
    - pandas >=1.3.0
    - scanpy >=1.9.0
    - anndata >=0.8.0
    - matplotlib-base >=3.6.3
    - seaborn >=0.11.0
    - scipy >=1.7.0
    - networkx >=2.6.0
    - leidenalg
    - adjusttext >=0.7.3
    - fa2_modified

test:
  imports:
    - genecircuitry
  commands:
    - genecircuitry --help

about:
  home: https://github.com/samuelecancellieri/genecircuitry
  summary: A package for transcriptional regulatory network analysis
  description: |
    GeneCircuitry is a Python package for transcriptional regulatory network
    (TRN) analysis using single-cell data. It integrates Scanpy, CellOracle,
    and Hotspot into a modular, checkpoint-enabled pipeline.

    NOTE: Two optional dependencies are not available on conda-forge/bioconda
    and must be installed separately via pip after the conda install:

      pip install celloracle==0.18.0 hotspotsc==1.1.3

  license: MIT
  license_file: LICENSE
  doc_url: https://github.com/samuelecancellieri/genecircuitry
  dev_url: https://github.com/samuelecancellieri/genecircuitry

extra:
  recipe-maintainers:
    - samuelecancellieri
  # Tells the bioconda bot to watch PyPI for new versions and auto-open
  # bump PRs once this recipe is merged into bioconda-recipes.
  identifiers:
    - pypi:genecircuitry
